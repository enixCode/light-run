services:
  light-run:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: light-run
    ports:
      - "${LIGHT_RUN_PORT:-3001}:3001"
    volumes:
      # Host Docker socket - light-runner spawns workload containers as
      # siblings on the host daemon, not nested inside this container.
      - /var/run/docker.sock:/var/run/docker.sock
      # Artifact dir bind-mount so outputs are inspectable from the host
      # without exec'ing into the container.
      - ./.artifacts:/app/artifacts
    environment:
      LIGHT_RUN_ARTIFACTS_DIR: /app/artifacts
      LIGHT_RUN_TOKEN: ${LIGHT_RUN_TOKEN:-}
      LIGHT_RUN_BODY_LIMIT: ${LIGHT_RUN_BODY_LIMIT:-10485760}
      LIGHT_RUN_MAX_ARTIFACTS_BYTES: ${LIGHT_RUN_MAX_ARTIFACTS_BYTES:-21474836480}
    restart: unless-stopped
